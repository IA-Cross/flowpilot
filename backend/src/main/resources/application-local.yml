# Local development overrides (not committed as .env; override via env vars in production)
app:
  security:
    jwt:
      # IMPORTANT: Replace with a strong random secret in production via JWT_SECRET env var
      secret: ${JWT_SECRET:local-dev-secret-replace-in-prod-must-be-at-least-256-bits!!}
      access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}    # 15 min default
      refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000} # 7 days default
    encryption:
      # AES-GCM master key: hex-encoded 32 bytes. Inject via env — never commit.
      master-key: ${ENCRYPTION_MASTER_KEY:}
  telegram:
    base-url: ${TELEGRAM_BASE_URL:https://api.telegram.org}
    # TELEGRAM_BOT_TOKEN and TELEGRAM_WEBHOOK_SECRET are stored encrypted per channel_connection.
    # Set them in the /api/v1/channels/telegram endpoint, not here.
