spring:
  application:
    name: flowpilot

  threads:
    virtual:
      enabled: true  # TRD §6 — Project Loom virtual threads for every request/async/scheduled task

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flowpilot}
    username: ${DB_USER:flowpilot}
    password: ${DB_PASS:flowpilot}

  jpa:
    hibernate:
      ddl-auto: validate           # schema managed exclusively by Flyway; Hibernate only validates
    open-in-view: false            # no lazy-load across request boundary
    properties:
      hibernate:
        format_sql: false
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}

# ---- Actuator / Observability ----
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true           # liveness (/health/liveness) + readiness (/health/readiness)
      show-details: always
  metrics:
    tags:
      application: flowpilot

# ---- Application secrets (all values from env/secret config — never committed) ----
# Override in profile YAMLs (application-local.yml, application-test.yml) or via env vars.
app:
  security:
    jwt:
      secret: ${JWT_SECRET:}                                        # REQUIRED in production
      access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}       # 15 min
      refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}  # 7 days
    encryption:
      master-key: ${ENCRYPTION_MASTER_KEY:}               # REQUIRED: hex 64-char = 32-byte AES-256 key
  telegram:
    base-url: ${TELEGRAM_BASE_URL:https://api.telegram.org}

# ---- Server ----
server:
  port: ${PORT:8080}

# ---- Logging ----
# MDC fields (tenantId, requestId) are populated by RequestLoggingFilter + JwtAuthFilter.
# Phase 7 will add a structured JSON appender for production; Phase 0 uses the console pattern.
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [tid=%X{tenantId} rid=%X{requestId}] %logger{30} - %msg%n"
  level:
    root: INFO
    com.iacross.flowpilot: DEBUG
