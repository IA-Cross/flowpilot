spring:
  application:
    name: flowpilot
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flowpilot}
    username: ${DB_USER:flowpilot}
    password: ${DB_PASS:flowpilot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
