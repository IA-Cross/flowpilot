version: '3.9'

# -----------------------------------------------------------------------
# FlowPilot — local development & single-VPS deployment (TRD §13, NFR-DEP-1)
# Usage:  cp .env.example .env  &&  docker compose up
# -----------------------------------------------------------------------

services:

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME:-flowpilot}
      POSTGRES_USER:     ${DB_USER:-flowpilot}
      POSTGRES_PASSWORD: ${DB_PASS:-flowpilot}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-flowpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DB_URL:              jdbc:postgresql://postgres:5432/${DB_NAME:-flowpilot}
      DB_USER:             ${DB_USER:-flowpilot}
      DB_PASS:             ${DB_PASS:-flowpilot}
      REDIS_HOST:          redis
      REDIS_PORT:          6379
      # JWT & encryption secrets MUST be overridden in production via real .env (not committed)
      JWT_SECRET:          ${JWT_SECRET:-CHANGE_ME_use_a_strong_256bit_secret_here}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:
