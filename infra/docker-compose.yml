version: '3.9'

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: flowpilot
      POSTGRES_USER: flowpilot
      POSTGRES_PASSWORD: flowpilot
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/flowpilot
      DB_USER: flowpilot
      DB_PASS: flowpilot
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
