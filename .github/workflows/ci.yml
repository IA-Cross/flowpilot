name: CI

on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # Testcontainers manages its own Postgres container — no service container needed.
      # The 'test' Spring profile loads application-test.yml with the deterministic JWT secret
      # and disables the Redis health check.
      - name: Build and test (Testcontainers)
        working-directory: backend
        run: ./gradlew clean build --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/build/reports/tests/

