name: CI

on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # Testcontainers spins up its own Postgres/Redis — no service containers needed
      - name: Build and test (Testcontainers)
        working-directory: backend
        run: ./gradlew clean build --no-daemon
        env:
          # Deterministic JWT secret for CI tests (matches application-test.yml)
          SPRING_PROFILES_ACTIVE: test
          # Suppress Testcontainers telemetry
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/build/reports/tests/

  dashboard:
    name: Dashboard — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - name: Install & build
        working-directory: dashboard
        run: |
          npm install
          npm run build

  widget:
    name: Widget — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: widget/package-lock.json
      - name: Install & build
        working-directory: widget
        run: |
          npm install
          npm run build
