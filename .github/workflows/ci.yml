name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: flowpilot_test
          POSTGRES_USER: flowpilot
          POSTGRES_PASSWORD: flowpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Build and test
        working-directory: backend
        run: ./gradlew build
        env:
          DB_URL: jdbc:postgresql://localhost:5432/flowpilot_test
          DB_USER: flowpilot
          DB_PASS: flowpilot

  dashboard:
    name: Dashboard — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - name: Install & build
        working-directory: dashboard
        run: npm ci && npm run build

  widget:
    name: Widget — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: widget/package-lock.json
      - name: Install & build
        working-directory: widget
        run: npm ci && npm run build
